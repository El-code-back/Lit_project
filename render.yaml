services:
  - type: web
    name: lit-project
    runtime: python
    repo: https://github.com/El-code-back/Lit_project
    plan: free
    region: frankfurt
    branch: main
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn mvp_school.wsgi --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - key: SECRET_KEY
        value: django-insecure-9f8a2b3c4d5e6f7g8h9i0j1k2l3m4n5o6p7q8r9s0t1u2v3w4x5y6z7
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://lit-project.onrender.com"
